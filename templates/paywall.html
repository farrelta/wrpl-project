{% extends "base.html" %}
{% block content %}
<div style="max-width:640px;margin:60px auto;padding:0 24px;text-align:center;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:48px 40px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:14px;">{{ article.category }}</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:28px;line-height:1.25;margin-bottom:20px;">{{ article.title }}</h1>
    <div style="background:var(--cream);border-radius:8px;padding:28px;margin-bottom:24px;">
      <div style="font-family:'Playfair Display',serif;font-size:18px;margin-bottom:10px;">★ Premium Article</div>
      <p style="color:var(--muted);font-size:14px;margin-bottom:0;">This article is available only to users with an active premium plan.</p>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <form action="/pricing" method="GET">
        <button type="submit" class="btn">Subscribe — Premium</button>
      </form>
    </div>
    <p style="margin-top:20px;font-size:13px;color:var(--muted);">Already a subscriber? <a href="/login" style="color:var(--accent);">Sign in</a></p>
  </div>
</div>
{% endblock %}
