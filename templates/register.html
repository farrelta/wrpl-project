{% extends "base.html" %}
{% block content %}
<div style="max-width:460px;margin:80px auto;padding:0 24px;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px;">
    <h2 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:8px;">Create account</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:28px;">New users are created as regular accounts.</p>
    {% if error %}
      <div style="background:#fdf0f0;border:1px solid #f0c0c0;border-radius:4px;padding:10px 14px;color:#c0392b;font-size:13px;margin-bottom:18px;">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register">
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;">Username</label>
        <input type="text" name="username" required
          style="width:100%;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:'Source Serif 4',serif;font-size:14px;color:var(--ink);background:var(--paper);">
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;">Email</label>
        <input type="email" name="email" required
          style="width:100%;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:'Source Serif 4',serif;font-size:14px;color:var(--ink);background:var(--paper);">
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;">Password</label>
        <input type="password" name="password" required
          style="width:100%;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:'Source Serif 4',serif;font-size:14px;color:var(--ink);background:var(--paper);">
      </div>
      <div style="margin-bottom:22px;">
        <label style="display:block;font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;">Preferences (optional)</label>
        <input type="text" name="preferences" placeholder="Tech,Sports"
          style="width:100%;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:'Source Serif 4',serif;font-size:14px;color:var(--ink);background:var(--paper);">
      </div>
      <button type="submit" class="btn" style="width:100%;">Create account</button>
    </form>
    <div style="margin-top:14px;font-size:13px;color:var(--muted);text-align:center;">
      Already have an account? <a href="/login" style="color:var(--accent);">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
