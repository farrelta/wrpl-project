{% extends "base.html" %}
{% block content %}
<div style="max-width:480px;margin:72px auto;padding:0 24px;text-align:center;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px;">
    <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:12px;">Subscription Error</h1>
    <p style="color:var(--muted);font-size:14px;margin-bottom:28px;">{{ error }}</p>
    <a href="{{ url_for('pricing') }}" class="btn">Back to Plans</a>
  </div>
</div>
{% endblock %}
